#:schema node_modules/wrangler/config-schema.json
name = "shuiyinxiangji-api"
main = "worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定（部署前需先创建：wrangler d1 create shuiyinxiangji-db）
# 创建后把 database_id 填入下方
[[d1_databases]]
binding = "DB"
database_name = "shuiyinxiangji-db"
database_id = "62c72411-197f-4c88-baec-97d857d5205d"

# 管理员账号（生产环境请使用 wrangler secret 设置更安全）
# wrangler secret put ADMIN_PASSWORD
[vars]
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "VIP1337"

# Worker 部署完成后会得到默认的 workers.dev 域名
# 无需配置 routes（除非绑定自定义域名）
